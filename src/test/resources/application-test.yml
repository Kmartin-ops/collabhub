spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:collabhub_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop  # H2 — let Hibernate manage schema in tests
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false  # disable Flyway for H2 — Hibernate creates schema directly

logging:
  level:
    com.collabhub: WARN
    root: WARN