spring:
  application:
    name: collabhub

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/collabhub
    username: collabhub
    password: collabhub
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: CollabHubPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate        # never auto-create — Flyway owns the schema
    show-sql: false             # set to true in dev for debugging
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

  #Default pagination settings
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
server:
  port: 8080

collabhub:
  app-description: "Collaborative project management platform"
  notifications:
    dispatcher-threads: 3
    queue-capacity: 200
  pagination:
    default-page-size: 20
    max-page-size: 100

logging:
  level:
    root: INFO
    com.collabhub: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true