spring:
  application:
    name: collabhub

server:
  port: 8080

# CollabHub custom properties
collabhub:
  app-description: "Collaborative project management platform"
  notifications:
    dispatcher-threads: 3
    queue-capacity: 200
  pagination:
    default-page-size: 20
    max-page-size: 100

# Logging defaults — overridden per profile
logging:
  level:
    root: INFO
    com.collabhub: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
# Springdoc OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true