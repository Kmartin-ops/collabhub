# Prod profile — minimal logging, hardened settings
spring:
  config:
    activate:
      on-profile: prod

server:
  port: ${PORT:8080}  # use PORT env var if set, else 8080

logging:
  level:
    root: WARN
    com.collabhub: INFO

collabhub:
  notifications:
    dispatcher-threads: 10
    queue-capacity: 1000
  pagination:
    default-page-size: 20
    max-page-size: 50
app:
  s3:
    bucket: ${S3_BUCKET_NAME}

# AWS SDK picks up credentials automatically from environment variables:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION