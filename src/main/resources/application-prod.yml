# Prod profile — minimal logging, hardened settings
spring:
  config:
    activate:
      on-profile: prod

server:
  port: ${PORT:8080}  # use PORT env var if set, else 8080

logging:
  level:
    root: WARN
    com.collabhub: INFO

collabhub:
  notifications:
    dispatcher-threads: 10
    queue-capacity: 1000
  pagination:
    default-page-size: 20
    max-page-size: 50