version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: collabhub-postgres
    environment:
      POSTGRES_DB:       collabhub
      POSTGRES_USER:     collabhub
      POSTGRES_PASSWORD: collabhub
    ports:
      - "5432:5432"
    volumes:
      - collabhub-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabhub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  collabhub-data: