name: CollabHub CI

on:
  push:
    branches: [ "**" ]   # run on every branch push
  pull_request:
    branches: [ main ]   # run on PRs targeting main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # cache Maven deps between runs

      # 3. Run full build and tests
      - name: Build and test
        run: mvn --batch-mode verify

      # 4. Upload test reports if tests fail
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/